<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ChatReader | Secure WhatsApp Analytics</title>
    
    <!-- Standalone Mobile App Configuration -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ChatReader" />
    <meta name="theme-color" content="#0a0a0a" />
    
    <!-- Mobile App Webclip Icons -->
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="shortcut icon" href="/icon.svg" type="image/svg+xml" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register the service worker to enable standalone PWA mode (removing browser tabs/URL bar)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('Service Worker Registered successfully', reg.scope);
            })
            .catch(err => {
              console.error('Service Worker Registration failure', err);
            });
        });
      }
    </script>
  </body>
</html>
